name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-notebook:
    name: Validate notebook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install nbformat
      - run: python -c "import nbformat; nbformat.read('notebook/aculeo_story.ipynb', as_version=4)"